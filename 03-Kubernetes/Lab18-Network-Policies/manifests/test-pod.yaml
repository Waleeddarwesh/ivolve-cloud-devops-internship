apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: ivolve
spec:
  containers:
    - name: busybox
      image: busybox
      command: ["sleep", "3600"]
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
  nodeSelector:
    node: worker
  tolerations:
    - key: "node"
      operator: "Equal"
      value: "worker"
      effect: "NoSchedule"
